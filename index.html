<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#FFD100">
<title>美团AI · 周末出行规划</title>
<link rel="stylesheet" href="static/css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">

<!-- 高德地图 JS API v2.0 -->
<script src="https://webapi.amap.com/v2/maps?v=2.0&key=a4359f00032bd8e52bc378e89604e1aa&plugin=AMap.Geolocation,AMap.Geocoder,AMap.PlaceSearch,AMap.Driving"></script>
</head>
<body>

<!-- Splash Screen -->
<div id="splash" class="splash">
  <div class="splash-logo">
    <svg viewBox="0 0 120 120" width="80" height="80">
      <rect x="10" y="10" width="100" height="100" rx="24" fill="#FFD100"/>
      <text x="60" y="78" text-anchor="middle" font-size="52" font-weight="900" fill="#000" font-family="sans-serif">M</text>
    </svg>
    <div class="splash-tagline">AI 周末出行规划</div>
  </div>
</div>

<!-- App Shell -->
<div id="app" class="app-container">

  <!-- Header -->
  <header class="app-header">
    <div class="header-left">
      <svg width="28" height="28" viewBox="0 0 120 120"><rect x="6" y="6" width="108" height="108" rx="26" fill="#FFD100"/><text x="60" y="82" text-anchor="middle" font-size="48" font-weight="900" fill="#000" font-family="sans-serif">M</text></svg>
      <span class="header-title">美团AI · 出行规划</span>
    </div>
    <div class="header-location" id="headerLocation" onclick="App.showLocationPicker()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 0-8 8c0 5.4 8 12 8 12s8-6.6 8-12a8 8 0 0 0-8-8z"/></svg>
      <span id="locationText">定位中...</span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="app-main">

    <!-- Home Screen -->
    <section id="homeScreen" class="screen active">
      <div class="hero-section">
        <div class="hero-illustration">
          <div class="hero-circle hero-circle-1"></div>
          <div class="hero-circle hero-circle-2"></div>
          <div class="hero-circle hero-circle-3"></div>
          <div class="hero-icon">🗺️</div>
        </div>
        <h1 class="hero-title">这个周末，想去哪儿？</h1>
        <p class="hero-subtitle">告诉我你的想法，我来规划一切</p>
      </div>

      <!-- Quick Scenario Cards -->
      <div class="scenario-cards">
        <div class="scenario-card family" onclick="App.quickStart('family')">
          <div class="scenario-icon">👨‍👩‍👧</div>
          <div class="scenario-info">
            <div class="scenario-name">家庭出行</div>
            <div class="scenario-desc">亲子友好 · 节奏舒缓</div>
          </div>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
        <div class="scenario-card friends" onclick="App.quickStart('friends')">
          <div class="scenario-icon">🎉</div>
          <div class="scenario-info">
            <div class="scenario-name">好友结伴</div>
            <div class="scenario-desc">打卡聚会 · 紧凑高效</div>
          </div>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>

      <!-- Chat Input on Home -->
      <div class="chat-input-container home-input">
        <div class="chat-input-wrapper">
          <input type="text" id="homeChatInput" class="chat-input"
                 placeholder="比如：周六下午，带老婆孩子玩半天..."
                 onkeydown="if(event.key==='Enter')App.sendHomeMessage()">
          <button class="chat-send-btn" onclick="App.sendHomeMessage()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </section>

    <!-- Chat Screen -->
    <section id="chatScreen" class="screen">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-container">
        <div class="chat-quick-actions" id="quickActions"></div>
        <div class="chat-input-wrapper">
          <input type="text" id="chatInput" class="chat-input"
                 placeholder="输入你的需求..."
                 onkeydown="if(event.key==='Enter')App.sendChatMessage()">
          <button class="chat-send-btn" onclick="App.sendChatMessage()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </section>

    <!-- Route Plan Screen -->
    <section id="routeScreen" class="screen">
      <div class="route-header">
        <button class="back-btn" onclick="App.goHome()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="route-title-group">
          <div class="route-badge" id="routeBadge">家庭出行</div>
          <div class="route-summary" id="routeSummary">共5站 · 预计5小时</div>
        </div>
        <button class="share-btn" onclick="App.sharePlan()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        </button>
      </div>

      <!-- Timeline -->
      <div class="route-timeline" id="routeTimeline"></div>

      <!-- Bottom Action Bar -->
      <div class="route-actions">
        <button class="btn btn-secondary" onclick="App.adjustPlan()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          调整方案
        </button>
        <button class="btn btn-primary" onclick="App.bookAll()">
          一键预订全部
        </button>
      </div>
    </section>

    <!-- POI Detail Modal -->
    <div id="poiModal" class="modal-overlay" onclick="if(event.target===this)App.closePoiModal()">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-content" id="poiModalContent"></div>
      </div>
    </div>

    <!-- Booking Modal -->
    <div id="bookingModal" class="modal-overlay" onclick="if(event.target===this)App.closeBookingModal()">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-content" id="bookingModalContent"></div>
      </div>
    </div>

    <!-- Location Picker Modal -->
    <div id="locationModal" class="modal-overlay" onclick="if(event.target===this)App.closeLocationModal()">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-content" id="locationModalContent"></div>
      </div>
    </div>

  </main>

  <!-- Tab Bar -->
  <nav class="tab-bar">
    <div class="tab-item active" data-tab="home" onclick="App.switchTab('home')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>首页</span>
    </div>
    <div class="tab-item" data-tab="chat" onclick="App.switchTab('chat')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>对话</span>
    </div>
    <div class="tab-item" data-tab="route" onclick="App.switchTab('route')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
      <span>行程</span>
    </div>
  </nav>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-spinner">
      <svg width="48" height="48" viewBox="0 0 48 48"><circle cx="24" cy="24" r="20" fill="none" stroke="#FFD100" stroke-width="3" stroke-dasharray="94" stroke-linecap="round"><animateTransform attributeName="transform" type="rotate" values="0 24 24;360 24 24" dur="1s" repeatCount="indefinite"/></circle></svg>
      <span id="loadingText">正在规划中...</span>
    </div>
  </div>

</div>

<script src="static/js/data.js"></script>
  <script src="static/js/amap.js"></script>
<script src="static/js/planner.js"></script>
<script src="static/js/chat.js"></script>
<script src="static/js/app.js"></script>
</body>
</html>
